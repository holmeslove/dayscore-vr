<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DayScore VR</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="overlay">
    <div id="overlay-inner">
      <div id="title">DayScore · VR</div>
      <div id="status">loading habits…</div>
      <div id="hint">put on your headset and tap <strong>enter vr</strong></div>
      <div id="vr-button-wrap"></div>
      <div id="footer">trigger to check · left stick to move</div>
    </div>
  </div>

  <audio id="bg-music" src="/music.mp3" loop preload="auto"></audio>
  <script type="module" src="/script.js"></script>
</body>
</html>
